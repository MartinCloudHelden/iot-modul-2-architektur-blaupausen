<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" font-family="Segoe UI, Helvetica, Arial, sans-serif"><rect width="1200" height="640" fill="#FAFAF8"/><defs>
<marker id="arrowE" markerWidth="11" markerHeight="9" refX="10" refY="4.5" orient="auto">
  <polygon points="0 0, 11 4.5, 0 9" fill="#374151"/>
</marker>
<marker id="dotS" markerWidth="8" markerHeight="8" refX="4" refY="4">
  <circle cx="4" cy="4" r="3.2" fill="#374151"/>
</marker>
<filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
  <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-opacity="0.12"/>
</filter>
</defs><text x="600.0" y="42" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="800" fill="#111827" text-anchor="middle">Muster 1: Direktanbindung</text><text x="600.0" y="68" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="400" fill="#6B7280" text-anchor="middle">Anti-Pattern — Maschine direkt im Büronetz (flaches Netz, keine Segmentierung)</text><rect x="60" y="100" width="1080" height="420" rx="14" fill="#FDECEC" stroke="#DC2626" stroke-width="2.5"/><text x="78" y="130" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#991B1B" letter-spacing="1">EIN GEMEINSAMES NETZ  (192.168.1.0/24)</text><rect x="520" y="270" width="160" height="70" rx="10" fill="#FFFFFF" stroke="#374151" stroke-width="2" filter="url(#shadow)"/><text x="600.0" y="301.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827" text-anchor="middle">Switch</text><text x="600.0" y="321.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B7280" text-anchor="middle">unmanaged</text><rect x="110" y="250" width="210" height="110" rx="10" fill="#FFFFFF" stroke="#374151" stroke-width="2" filter="url(#shadow)"/><text x="215.0" y="301.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827" text-anchor="middle">Alte Maschine</text><text x="215.0" y="321.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B7280" text-anchor="middle">SPS · Modbus TCP · keine Auth</text><polygon points="300,228 316.15,257.75 283.85,257.75" fill="#DC2626" rx="3"/><text x="300" y="253.5" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19.549999999999997" font-weight="800" fill="#FFF" text-anchor="middle">!</text><rect x="820" y="150" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#374151" stroke-width="2" filter="url(#shadow)"/><text x="920.0" y="181.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827" text-anchor="middle">Büro-PCs</text><text x="920.0" y="201.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B7280" text-anchor="middle">E-Mail, Browser, USB …</text><rect x="820" y="270" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#374151" stroke-width="2" filter="url(#shadow)"/><text x="920.0" y="301.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827" text-anchor="middle">Server</text><text x="920.0" y="321.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B7280" text-anchor="middle">AD, ERP, Dateiablage</text><rect x="820" y="390" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#374151" stroke-width="2" filter="url(#shadow)"/><text x="920.0" y="421.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#111827" text-anchor="middle">Internet-Router</text><text x="920.0" y="441.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#6B7280" text-anchor="middle">NAT, ggf. Port-Forwards</text><polygon points="1040,368 1056.15,397.75 1023.85,397.75" fill="#DC2626" rx="3"/><text x="1040" y="393.5" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19.549999999999997" font-weight="800" fill="#FFF" text-anchor="middle">!</text><line x1="320" y1="305" x2="515" y2="305" stroke="#374151" stroke-width="2.5" marker-end="url(#arrowE)" marker-start="url(#dotS)"/><rect x="274.7" y="280.0" width="285.6" height="19" rx="4" fill="#FFFFFF" opacity="0.92"/><text x="417.5" y="293.0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="600" fill="#374151" text-anchor="middle">Modbus TCP (Port 502, unverschlüsselt)</text><line x1="680" y1="290" x2="815" y2="195" stroke="#374151" stroke-width="2.5" marker-end="url(#arrowE)" marker-start="url(#dotS)"/><line x1="680" y1="305" x2="815" y2="305" stroke="#374151" stroke-width="2.5" marker-end="url(#arrowE)" marker-start="url(#dotS)"/><line x1="680" y1="320" x2="815" y2="415" stroke="#374151" stroke-width="2.5" marker-end="url(#arrowE)" marker-start="url(#dotS)"/><text x="600" y="560" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#DC2626" text-anchor="middle">Jedes Gerät im Netz erreicht die Steuerung direkt — ein infizierter Büro-PC genügt.</text><text x="600" y="585" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#6B7280" text-anchor="middle" font-style="italic">Kein Übergabepunkt, kein Monitoring, keine Protokollgrenze. Nur als Negativbeispiel verwenden.</text></svg>